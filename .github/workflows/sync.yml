name: Upstream Sync and Documentation Update

permissions:
  contents: write
  issues: write
  actions: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - uses: actions/checkout@v4

      - name: Clean issue notice
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'close-issues'
          labels: '🚨 Sync Fail'

      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          upstream_sync_repo: binary-husky/gpt_academic
          upstream_sync_branch: frontier
          target_sync_branch: frontier
          target_repo_token: ${{ secrets.GITHUB_TOKEN }}
          test_mode: false

      - name: Sync check
        if: failure()
        uses: actions-cool/issues-helper@v3
        with:
          actions: 'create-issue'
          title: '🚨 同步失败 | Sync Fail'
          labels: '🚨 Sync Fail'
          body: |
            由于上游仓库的 workflow 文件变更，导致 GitHub 自动暂停了本次自动更新，你需要手动 Sync Fork 一次。

  update_docs:
    name: Auto Update and Sync Docs
    needs: sync_latest_from_upstream
    runs-on: ubuntu-latest

    steps:
      - name: Check out current branch
        uses: actions/checkout@v4

      - name: Download, unzip, and process files
        run: |
          curl -L https://codeload.github.com/binary-husky/gpt_academic/zip/refs/heads/frontier -o gpt_academic.zip
          unzip -oq gpt_academic.zip -d gpt_academic && rm gpt_academic.zip
          mkdir -p ./docs
          mv gpt_academic/gpt_academic-frontier/docs/GithubAction* ./docs/
          find ./docs -name '*+*' -exec bash -c 'mv "$0" "${0//+/\.}"' {} \;

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ./docs
          git diff-index --quiet HEAD || git commit -m "Merge branch 'frontier' of https://github.com/binary-husky/gpt_academic"
          git push
